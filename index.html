<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <!-- ═══════════════════════════════════ -->
    <!--         SCREEN 1 — HOME            -->
    <!-- ═══════════════════════════════════ -->
    <div id="home-screen" class="screen">
      <div class="screen-icon">🧠</div>
      <h1>Quiz App</h1>
      <p class="subtitle">Test your knowledge across multiple categories!</p>
      <div class="input-group">
        <label for="username-input">Enter Your Name</label>
        <input type="text" id="username-input" placeholder="e.g. Chetan">
      </div>
      <button id="start-btn">Start Quiz →</button>
    </div>

    <!-- ═══════════════════════════════════ -->
    <!--       SCREEN 2 — CATEGORY          -->
    <!-- ═══════════════════════════════════ -->
    <div id="category-screen" class="screen">
      <h2>Choose a Category</h2>
      <p class="subtitle">Select a topic to begin your quiz</p>
      <div class="category-grid">
        <button class="category-btn" data-category="generalKnowledge">
          <span class="cat-icon">🌍</span>
          <span class="cat-name">General Knowledge</span>
        </button>
        <button class="category-btn" data-category="computerScience">
          <span class="cat-icon">💻</span>
          <span class="cat-name">Computer Science</span>
        </button>
        <button class="category-btn" data-category="geography">
          <span class="cat-icon">🗺️</span>
          <span class="cat-name">Geography</span>
        </button>
        <button class="category-btn" data-category="sports">
          <span class="cat-icon">⚽</span>
          <span class="cat-name">Sports</span>
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════ -->
    <!--       SCREEN 3 — QUESTION          -->
    <!-- ═══════════════════════════════════ -->
    <div id="question-screen" class="screen">

      <div class="quiz-header">
        <span id="question-counter">Question 1 of 10</span>
        <span id="score-display">Score: 0</span>
        <span id="timer" class="">15</span>
      </div>

      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>

      <h2 id="question-text">Question goes here</h2>

      <div class="options-grid">
        <button class="option-btn" id="opt-0"></button>
        <button class="option-btn" id="opt-1"></button>
        <button class="option-btn" id="opt-2"></button>
        <button class="option-btn" id="opt-3"></button>
      </div>

      <button id="next-btn">Next Question →</button>

    </div>

    <!-- ═══════════════════════════════════ -->
    <!--        SCREEN 4 — RESULT           -->
    <!-- ═══════════════════════════════════ -->
    <div id="result-screen" class="screen">
      <div class="result-icon">🏆</div>
      <h2>Quiz Complete!</h2>
      <p id="result-username"></p>

      <div class="final-score-box">
        <p id="final-score">0 / 10</p>
        <p id="score-percentage">0%</p>
      </div>

      <div class="result-details">
        <p id="correct-count">✓ Correct: 0</p>
        <p id="wrong-count">✗ Wrong: 0</p>
      </div>

      <p id="performance-msg"></p>
      <!-- ADD THIS BELOW -->
      <div class="highscore-box">
        <p>🏅 Your Best Score: <span id="high-score-display">0</span> / 10</p>
      </div>

      <button id="play-again-btn">🔄 Play Again</button>
      <button id="change-cat-btn">📂 Change Category</button>
    </div>

  </div><!-- end app-container -->

  <!-- questions.js MUST be first -->
  <script src="questions.js"></script>
  <script src="script.js"></script>

</body>
</html>
